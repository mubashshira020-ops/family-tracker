<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jindal Family Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Aapki verified configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCbAW-YTMuCt2q_dW4wyjzSa8UgQjOb96Q",
            authDomain: "family-782ba.firebaseapp.com",
            projectId: "family-782ba",
            storageBucket: "family-782ba.firebasestorage.app",
            messagingSenderId: "733262064918",
            appId: "1:733262064918:web:0321d05a994b2198ba7437",
            measurementId: "G-66FCKT68F"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "family-782ba";

        // Data save karne ka function
        window.saveData = async (entry) => {
            if (!auth.currentUser) {
                alert("Auth Error: Anonymous login chalu nahi hai!");
                return;
            }
            try {
                const collId = `logs_${window.currentMember.replace(/\s/g, '_')}`;
                // Correct path as per Rule 1
                const ref = doc(db, 'artifacts', appId, 'public', 'data', collId, entry.id);
                await setDoc(ref, entry);
                return true;
            } catch (e) {
                console.error("Save Error:", e);
                alert("Data save nahi hua. Firebase Rules check karein.");
                return false;
            }
        };

        // Real-time data sunne ka function
        window.listenData = (callback) => {
            if (!auth.currentUser) return;
            const collId = `logs_${window.currentMember.replace(/\s/g, '_')}`;
            const ref = collection(db, 'artifacts', appId, 'public', 'data', collId);
            return onSnapshot(ref, (snap) => {
                const data = [];
                snap.forEach(d => data.push(d.data()));
                callback(data);
            }, (err) => console.error("Firebase Error:", err));
        };

        // Login handle karna
        onAuthStateChanged(auth, (user) => {
            const statusBox = document.getElementById('authStatus');
            if (!user) {
                signInAnonymously(auth).catch(err => {
                    statusBox.innerText = "Error: Auth failed!";
                    statusBox.className = "text-xs font-bold text-red-500 mt-2";
                });
            } else {
                statusBox.innerText = "System Live (Online)";
                statusBox.className = "text-xs font-bold text-green-600 mt-2";
                if (window.initTracker) window.initTracker();
            }
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background-color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .active-tab { background: #4f46e5 !important; color: white !important; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-5xl mx-auto pb-24">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-800 text-slate-900 tracking-tight">Jindal Family Dashboard</h1>
        <div id="authStatus" class="text-xs font-bold text-orange-500 mt-2 tracking-widest uppercase">Connecting...</div>
    </div>

    <!-- Member Switcher -->
    <div class="flex justify-center gap-3 mb-8 overflow-x-auto no-scrollbar py-2">
        <button onclick="switchMember('Kapil Jindal')" id="tab-Kapil" class="px-8 py-3 rounded-2xl font-bold border bg-white shadow-sm transition-all whitespace-nowrap active-tab">Kapil</button>
        <button onclick="switchMember('Atharva Jindal')" id="tab-Atharva" class="px-8 py-3 rounded-2xl font-bold border bg-white shadow-sm transition-all whitespace-nowrap">Atharva</button>
        <button onclick="switchMember('Rinky Jindal')" id="tab-Rinky" class="px-8 py-3 rounded-2xl font-bold border bg-white shadow-sm transition-all whitespace-nowrap">Rinky</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Input Form -->
        <div class="card p-8">
            <h2 id="currentName" class="text-2xl font-800 text-slate-800 mb-6 border-b pb-2">Kapil Jindal</h2>
            <form id="logForm" class="space-y-5">
                <div>
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Date</label>
                    <input type="date" id="date" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold focus:border-indigo-500 outline-none transition-all" required>
                </div>
                <div>
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Category</label>
                    <select id="category" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold focus:border-indigo-500 outline-none transition-all"></select>
                </div>
                <div>
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Value (Minutes/Qty)</label>
                    <input type="number" id="value" placeholder="How much?" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold focus:border-indigo-500 outline-none transition-all" required>
                </div>
                <button type="submit" id="saveBtn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-800 text-lg hover:bg-indigo-600 transition-all shadow-xl">
                    Save Record
                </button>
            </form>
        </div>

        <!-- Graph Section -->
        <div class="card p-8 h-80 lg:h-auto">
            <h3 class="text-[10px] font-800 text-slate-400 uppercase tracking-widest mb-4 text-center">Weekly Activity Mix</h3>
            <div class="h-64">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>

    <!-- History -->
    <div class="card mt-10 overflow-hidden">
        <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
            <h3 class="text-sm font-800 text-slate-800">Recent Activity Logs</h3>
            <span id="logCount" class="bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-full font-bold">0 Records</span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] font-800 text-slate-400 uppercase">
                    <tr>
                        <th class="px-8 py-4">Date</th>
                        <th class="px-8 py-4">Activity</th>
                        <th class="px-8 py-4 text-right">Value</th>
                    </tr>
                </thead>
                <tbody id="historyBody" class="divide-y divide-slate-100">
                    <tr><td colspan="3" class="p-10 text-center text-slate-400 font-bold">No data found in cloud</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.currentMember = "Kapil Jindal";
        let chart = null;
        let unsub = null;

        const cats = {
            'Kapil Jindal': ['Mobile Time', 'TV Time', 'Physical Activity', 'Hookah', 'Cigarette', 'Alcohol', 'Junk Food', 'Sleep'],
            'Atharva Jindal': ['Mobile Time', 'TV Time', 'Self Study', 'Classwork', 'Physical Activity'],
            'Rinky Jindal': ['Mobile Time', 'TV Time', 'Physical Activity', 'Zoho Review', 'Office Meeting']
        };

        window.switchMember = (name) => {
            window.currentMember = name;
            document.getElementById('currentName').innerText = name;
            
            // Tab styling
            ['Kapil', 'Atharva', 'Rinky'].forEach(m => {
                const btn = document.getElementById(`tab-${m}`);
                if (name.includes(m)) btn.classList.add('active-tab');
                else btn.classList.remove('active-tab');
            });

            document.getElementById('category').innerHTML = cats[name].map(c => `<option value="${c}">${c}</option>`).join('');
            if (unsub) unsub();
            if (window.listenData) unsub = window.listenData(updateUI);
        };

        function updateUI(logs) {
            const body = document.getElementById('historyBody');
            document.getElementById('logCount').innerText = `${logs.length} Records`;

            if (logs.length === 0) {
                body.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-400 font-bold">No data yet</td></tr>';
                renderChart([]);
                return;
            }

            const sorted = logs.sort((a,b) => new Date(b.date) - new Date(a.date));
            body.innerHTML = sorted.map(l => `
                <tr class="hover:bg-indigo-50/50 transition-colors">
                    <td class="px-8 py-4 font-bold text-slate-400">${l.date}</td>
                    <td class="px-8 py-4 font-800 text-slate-700">${l.category}</td>
                    <td class="px-8 py-4 text-right">
                        <span class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-xl font-800">${l.value}</span>
                    </td>
                </tr>
            `).join('');

            renderChart(logs);
        }

        function renderChart(logs) {
            const summary = {};
            logs.forEach(l => summary[l.category] = (summary[l.category] || 0) + Number(l.value));
            
            const ctx = document.getElementById('myChart').getContext('2d');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(summary),
                    datasets: [{ 
                        data: Object.values(summary), 
                        backgroundColor: '#4f46e5',
                        borderRadius: 12,
                        barThickness: 25
                    }]
                },
                options: { 
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } },
                        y: { grid: { display: false }, ticks: { font: { weight: 'bold' } } }
                    }
                }
            });
        }

        document.getElementById('logForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "Saving to Cloud...";

            const entry = {
                id: Date.now().toString(),
                date: document.getElementById('date').value,
                category: document.getElementById('category').value,
                value: document.getElementById('value').value
            };
            
            const success = await window.saveData(entry);
            if (success) {
                document.getElementById('value').value = '';
            }
            btn.disabled = false;
            btn.innerText = "Save Record";
        };

        window.initTracker = () => {
            document.getElementById('date').valueAsDate = new Date();
            window.switchMember('Kapil Jindal');
        };
    </script>
</body>
</html>
