<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jindal Family Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbAW-YTMuCt2q_dW4wyjzSa8UgQjOb96Q",
            authDomain: "family-782ba.firebaseapp.com",
            projectId: "family-782ba",
            storageBucket: "family-782ba.firebasestorage.app",
            messagingSenderId: "733262064918",
            appId: "1:733262064918:web:0321d05a994b2198ba7437"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "family-782ba";

        window.saveData = async (entry) => {
            if (!auth.currentUser) return;
            const collId = `logs_${window.currentMember.replace(/\s/g, '_')}`;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', collId, entry.id), entry);
        };

        window.deleteEntry = async (id) => {
            const collId = `logs_${window.currentMember.replace(/\s/g, '_')}`;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', collId, id));
        };

        window.allLogs = {};
        window.listenAll = () => {
            ['Kapil Jindal', 'Atharva Jindal', 'Rinky Jindal'].forEach(m => {
                const collId = `logs_${m.replace(/\s/g, '_')}`;
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', collId), (snap) => {
                    const data = [];
                    snap.forEach(d => data.push(d.data()));
                    window.allLogs[m] = data;
                    if (window.currentMember === m) window.updateUI(data);
                    if (document.getElementById('reportModal').style.display === 'flex') window.renderReport();
                }, (error) => console.error("Data Fetch Error:", error));
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (!user) signInAnonymously(auth);
            else {
                window.listenAll();
                window.initApp();
            }
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #334155; }
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 4px 12px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .active-member { background: #4f46e5 !important; color: white !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); z-index: 50; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        
        .stat-box { background: white; border-radius: 16px; padding: 16px; border: 1px solid #e2e8f0; border-left: 4px solid #4f46e5; }
        
        .calendar-input-wrapper { background: #ffffff; border-radius: 12px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; border: 1px solid #e2e8f0; }
        .calendar-input-wrapper input { background: transparent; border: none; outline: none; font-weight: 600; color: #1e293b; font-size: 13px; width: 100%; cursor: pointer; }

        .nav-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #e2e8f0; background: white; color: #64748b; }
        
        .report-th { padding: 10px 4px; font-weight: 700; text-align: center; border-left: 1px solid #f1f5f9; min-width: 75px; background: #f8fafc; color: #475569; font-size: 12px; }
        .report-th .date-top { color: #4f46e5; font-size: 11px; margin-bottom: 0px; }
        .report-th .day-sub { color: #94a3b8; font-size: 8px; font-weight: 700; text-transform: uppercase; }
        
        .activity-th { background: #f8fafc; color: #1e293b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; padding: 10px 16px; font-size: 10px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-6 max-w-[1400px] mx-auto">

    <!-- Header Section -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-md">FJ</div>
            <div>
                <h1 class="text-lg font-800 text-slate-800">Jindal Family Tracker</h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Discipline Monitoring</p>
            </div>
        </div>

        <div class="flex bg-white shadow-sm border border-slate-200 p-1 rounded-xl">
            <button onclick="switchMember('Kapil Jindal')" id="btn-Kapil" class="px-4 py-1.5 rounded-lg font-bold text-[11px] transition-all active-member">Kapil Jindal</button>
            <button onclick="switchMember('Atharva Jindal')" id="btn-Atharva" class="px-4 py-1.5 rounded-lg font-bold text-[11px] transition-all text-slate-500">Atharva Jindal</button>
            <button onclick="switchMember('Rinky Jindal')" id="btn-Rinky" class="px-4 py-1.5 rounded-lg font-bold text-[11px] transition-all text-slate-500">Rinky Jindal</button>
        </div>

        <button onclick="openReport()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-[11px] shadow-md flex items-center gap-2 hover:bg-indigo-700 transition-all">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Weekly Report
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- Input Column -->
        <div class="lg:col-span-4">
            <div class="glass-card p-6">
                <h2 class="text-xs font-800 mb-6 text-slate-800 uppercase tracking-tight flex items-center gap-2">
                    <span class="w-1.5 h-4 bg-indigo-600 rounded-full"></span>
                    Entry: <span id="entryName" class="text-indigo-600">Kapil</span>
                </h2>
                <form id="mainForm" class="space-y-4">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Date</label>
                        <div class="calendar-input-wrapper bg-slate-50 border-none">
                            <input type="date" id="formDate">
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Activity</label>
                        <select id="formCat" onchange="updateQuickUI()" class="w-full p-2.5 bg-slate-50 border-none rounded-xl font-bold text-xs outline-none focus:ring-1 focus:ring-indigo-500/20"></select>
                    </div>
                    <div id="durationInputs" class="grid grid-cols-2 gap-3">
                        <input type="number" id="valH" placeholder="Hrs" class="w-full p-2.5 bg-slate-50 rounded-xl font-bold text-xs border-none outline-none">
                        <input type="number" id="valM" placeholder="Min" class="w-full p-2.5 bg-slate-50 rounded-xl font-bold text-xs border-none outline-none">
                    </div>
                    <div id="qtyInput" class="hidden">
                        <input type="number" id="valQty" placeholder="Count" class="w-full p-2.5 bg-slate-50 rounded-xl font-bold text-xs outline-none">
                    </div>
                    <div id="quickRow" class="flex flex-wrap gap-2"></div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-md hover:bg-black transition-all">Save Entry</button>
                </form>
            </div>
        </div>

        <!-- Stats Column -->
        <div class="lg:col-span-8 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="statsGrid"></div>
            <div class="glass-card overflow-hidden">
                <div class="px-6 py-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                    <h3 class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Logs</h3>
                    <span id="logCount" class="text-[8px] font-bold text-indigo-600 bg-indigo-50 px-2.5 py-0.5 rounded-full uppercase">0 Entries</span>
                </div>
                <div class="max-h-[350px] overflow-y-auto no-scrollbar">
                    <table class="w-full">
                        <tbody id="logTable" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Weekly Report Modal -->
    <div id="reportModal" class="modal">
        <div class="bg-white w-[98%] max-w-[1350px] h-[92vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
            
            <div class="px-6 py-4 flex justify-between items-center border-b border-slate-100 bg-white">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-800 text-slate-800 tracking-tight">Summary</h2>
                        <p id="reportMonthInfo" class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Progress Viewer</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-1.5">
                        <div onclick="shiftWeek(-7)" class="nav-btn hover:bg-slate-50"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"/></svg></div>
                        <div class="calendar-input-wrapper">
                            <input type="date" id="reportDatePicker" onchange="window.reportPivot = new Date(this.value); renderReport();">
                        </div>
                        <div onclick="shiftWeek(7)" class="nav-btn hover:bg-slate-50"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/></svg></div>
                    </div>
                    <button onclick="closeReport()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-400 hover:text-red-500 transition-all">✕</button>
                </div>
            </div>

            <div class="flex-1 overflow-auto p-6 space-y-8 bg-slate-50/50" id="reportContent"></div>
            
            <div class="p-4 border-t bg-white flex justify-center">
                <button onclick="closeReport()" class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-md">Close Report</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIGS = {
            'Kapil Jindal': [
                { name: 'Mobile Time', icon: '📱', type: 'time', quick: [30, 60, 120] },
                { name: 'TV Time', icon: '📺', type: 'time', quick: [30, 60] },
                { name: 'Physical Activity', icon: '🏃', type: 'time', quick: [30, 60] },
                { name: 'Family Time', icon: '👨‍👩‍👧', type: 'time', quick: [30, 60] },
                { name: 'Coco Time', icon: '☕', type: 'time', quick: [15, 30] },
                { name: 'Hookah', icon: '💨', type: 'time', quick: [15, 30] },
                { name: 'Cigarette', icon: '🚬', type: 'qty', label: 'Pcs', quick: [1, 2] },
                { name: 'Alcohol', icon: '🍷', type: 'qty', label: 'ML', quick: [30, 60] },
                { name: 'Junk Food', icon: '🍔', type: 'qty', label: 'Items', quick: [1] },
                { name: 'Sleep', icon: '😴', type: 'time', quick: [480, 540] }
            ],
            'Atharva Jindal': [
                { name: 'Mobile Time', icon: '📱', type: 'time', quick: [15, 30, 60] },
                { name: 'TV Time', icon: '📺', type: 'time', quick: [30, 60] },
                { name: 'Self Study', icon: '📚', type: 'time', quick: [60, 120] },
                { name: 'Physical Activity', icon: '🏃', type: 'time', quick: [30, 60] }
            ],
            'Rinky Jindal': [
                { name: 'Mobile Time', icon: '📱', type: 'time', quick: [15, 30, 60] },
                { name: 'TV Time', icon: '📺', type: 'time', quick: [30, 60] },
                { name: 'Office Work', icon: '💼', type: 'time', quick: [60, 120] },
                { name: 'Physical Activity', icon: '🏃', type: 'time', quick: [30, 60] }
            ]
        };

        window.currentMember = 'Kapil Jindal';
        window.reportPivot = new Date();

        window.initApp = () => {
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('formDate').value = todayStr;
            document.getElementById('reportDatePicker').value = todayStr;
            switchMember('Kapil Jindal');
        };

        window.switchMember = (name) => {
            window.currentMember = name;
            document.getElementById('entryName').innerText = name.split(' ')[0];
            ['Kapil', 'Atharva', 'Rinky'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                if (name.includes(m)) btn.classList.add('active-member');
                else btn.classList.remove('active-member');
            });
            const catSelect = document.getElementById('formCat');
            catSelect.innerHTML = CONFIGS[name].map(c => `<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');
            updateQuickUI();
            updateUI(window.allLogs[name] || []);
        };

        window.updateQuickUI = () => {
            const catName = document.getElementById('formCat').value;
            const config = CONFIGS[window.currentMember].find(c => c.name === catName);
            const dur = document.getElementById('durationInputs');
            const qty = document.getElementById('qtyInput');
            if (config.type === 'time') { dur.classList.remove('hidden'); qty.classList.add('hidden'); } 
            else { dur.classList.add('hidden'); qty.classList.remove('hidden'); }
            document.getElementById('quickRow').innerHTML = config.quick.map(v => `<button type="button" class="bg-slate-100 hover:bg-indigo-600 hover:text-white px-3 py-1 rounded-lg text-[9px] font-bold text-slate-500 transition-all" onclick="setQuickVal(${v})">${config.type === 'time' ? v+'m' : '+'+v}</button>`).join('');
        };

        window.setQuickVal = (v) => {
            const config = CONFIGS[window.currentMember].find(c => c.name === document.getElementById('formCat').value);
            if (config.type === 'time') { document.getElementById('valH').value = Math.floor(v/60); document.getElementById('valM').value = v%60; } 
            else { document.getElementById('valQty').value = v; }
        };

        window.updateUI = (logs) => {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = CONFIGS[window.currentMember].slice(0,4).map(c => {
                const sum = logs.filter(l => l.category === c.name).reduce((s, e) => s + e.val, 0);
                const disp = c.type === 'time' ? `${Math.floor(sum/60)}h ${sum%60}m` : `${sum} ${c.label}`;
                return `<div class="stat-box shadow-sm hover:shadow-md transition-shadow"><p class="text-[8px] font-bold text-slate-400 uppercase mb-0.5 tracking-widest">${c.icon} ${c.name}</p><p class="text-lg font-800 text-slate-800">${disp}</p></div>`;
            }).join('');
            const sorted = logs.sort((a,b) => b.timestamp.localeCompare(a.timestamp));
            document.getElementById('logCount').innerText = `${sorted.length} ENTRIES`;
            document.getElementById('logTable').innerHTML = sorted.map(l => `<tr class="hover:bg-slate-50/50"><td class="px-6 py-2.5"><p class="text-[8px] font-bold text-slate-400 uppercase mb-0.5">${l.date}</p><p class="font-700 text-slate-700 text-[11px]">${l.category}</p></td><td class="px-6 py-2.5 text-right font-bold text-indigo-600 text-xs">${l.display}</td><td class="px-6 py-2.5 w-8"><button onclick="window.deleteEntry('${l.id}')" class="text-slate-300 hover:text-red-500">✕</button></td></tr>`).join('');
        };

        document.getElementById('mainForm').onsubmit = async (e) => {
            e.preventDefault();
            const config = CONFIGS[window.currentMember].find(c => c.name === document.getElementById('formCat').value);
            let val = 0, display = "";
            if (config.type === 'time') { const h = parseInt(document.getElementById('valH').value) || 0; const m = parseInt(document.getElementById('valM').value) || 0; val = (h * 60) + m; display = `${h}h ${m}m`; } 
            else { val = parseInt(document.getElementById('valQty').value) || 0; display = `${val} ${config.label}`; }
            if (val > 0) {
                await window.saveData({ id: Date.now().toString(), date: document.getElementById('formDate').value, category: config.name, val, display, timestamp: new Date().toISOString() });
                document.getElementById('valH').value = ""; document.getElementById('valM').value = ""; document.getElementById('valQty').value = "";
            }
        };

        window.openReport = () => { document.getElementById('reportModal').style.display = 'flex'; renderReport(); };
        window.closeReport = () => document.getElementById('reportModal').style.display = 'none';
        window.shiftWeek = (days) => { window.reportPivot.setDate(window.reportPivot.getDate() + days); document.getElementById('reportDatePicker').value = window.reportPivot.toISOString().split('T')[0]; renderReport(); };

        window.renderReport = () => {
            const pivot = new Date(window.reportPivot);
            const y = pivot.getFullYear(), m = pivot.getMonth();
            const d = pivot.getDate();
            const lastDay = new Date(y, m + 1, 0).getDate();
            
            let start, end, weekNum;
            if (d <= 7) { start = 1; end = 7; weekNum = "Week 1"; }
            else if (d <= 14) { start = 8; end = 14; weekNum = "Week 2"; }
            else if (d <= 21) { start = 15; end = 21; weekNum = "Week 3"; }
            else { start = 22; end = lastDay; weekNum = "Week 4"; }

            const monthLong = pivot.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            document.getElementById('reportMonthInfo').innerText = `${monthLong} • ${weekNum}`;

            const weekDates = [];
            for(let i = start; i <= end; i++) {
                const dateObj = new Date(y, m, i);
                const monthName = dateObj.toLocaleDateString('en-US', { month: 'short' });
                weekDates.push({
                    str: dateObj.toISOString().split('T')[0],
                    day: dateObj.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase(),
                    dateDisplay: `${monthName} ${i}`
                });
            }

            let html = '';
            ['Kapil Jindal', 'Atharva Jindal', 'Rinky Jindal'].forEach(member => {
                const logs = window.allLogs[member] || [];
                html += `
                    <div class="space-y-3">
                        <div class="flex items-center gap-2 border-l-4 border-indigo-600 pl-3">
                            <h3 class="text-md font-800 text-slate-800 tracking-tight">${member}</h3>
                        </div>
                        <div class="glass-card overflow-hidden shadow-sm border-slate-100">
                            <div class="overflow-x-auto no-scrollbar">
                                <table class="w-full text-left">
                                    <thead>
                                        <tr>
                                            <th class="activity-th min-w-[160px]">Activity</th>
                                            ${weekDates.map(d => `<th class="report-th"><div class="day-sub">${d.day}</div><div class="date-top">${d.dateDisplay}</div></th>`).join('')}
                                            <th class="p-2 bg-indigo-600 text-white text-center font-bold uppercase text-[9px] tracking-widest">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-50">
                `;
                CONFIGS[member].forEach(cat => {
                    let totalVal = 0;
                    const cells = weekDates.map(d => {
                        const val = logs.filter(l => l.date === d.str && l.category === cat.name).reduce((s, e) => s + e.val, 0);
                        totalVal += val;
                        return `<td class="p-2.5 text-center font-bold text-slate-500 border-l border-slate-50 text-[11px]">${val > 0 ? (cat.type === 'time' ? (val >= 60 ? Math.floor(val/60)+'h' : val+'m') : val) : '<span class="text-slate-100">-</span>'}</td>`;
                    }).join('');
                    html += `
                        <tr class="hover:bg-slate-50/40">
                            <td class="p-2.5 font-700 text-slate-700 text-[11px] flex items-center gap-2">
                                <span class="opacity-70">${cat.icon}</span> ${cat.name}
                            </td>
                            ${cells}
                            <td class="p-2.5 text-center font-800 text-indigo-700 bg-indigo-50/30 border-l border-indigo-100/30 text-[11px]">
                                ${cat.type === 'time' ? (totalVal >= 60 ? Math.floor(totalVal/60)+'h '+(totalVal%60)+'m' : totalVal+'m') : totalVal}
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table></div></div></div>`;
            });
            document.getElementById('reportContent').innerHTML = html;
        };
    </script>
</body>
</html>
