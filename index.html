<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jindal Family Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jindal-family-tracker';

        window.db = db;
        window.appId = appId;
        window.auth = auth;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-brand { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .text-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .member-btn { transition: all 0.2s; border: 1px solid #e2e8f0; font-weight: 800; }
        .member-btn.active { background: #4f46e5; color: white; border-color: #4338ca; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        input, select { border: 1px solid #e2e8f0; padding: 0.75rem; border-radius: 12px; width: 100%; font-weight: 600; }
        input:focus { outline: none; border-color: #4f46e5; ring: 2px ring-indigo-100; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">
    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="gradient-brand p-2 rounded-xl text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-900 text-gradient tracking-tight">Jindal Family</h1>
                    <p class="text-[9px] font-black uppercase tracking-widest text-slate-400">Daily Activity Hub</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-6">
        <!-- Family Members Tab -->
        <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="changeMember('Kapil Jindal')" id="tabKapil" class="member-btn active px-6 py-3 rounded-xl text-sm whitespace-nowrap bg-white">Kapil Jindal</button>
            <button onclick="changeMember('Atharva Jindal')" id="tabAtharva" class="member-btn px-6 py-3 rounded-xl text-sm whitespace-nowrap bg-white">Atharva Jindal</button>
            <button onclick="changeMember('Rinky Jindal')" id="tabRinky" class="member-btn px-6 py-3 rounded-xl text-sm whitespace-nowrap bg-white">Rinky Jindal</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Entry Form Section -->
            <div class="lg:col-span-5">
                <div class="glass-card p-6">
                    <h2 id="formName" class="text-3xl font-900 text-slate-900 mb-6 tracking-tighter">Kapil Jindal</h2>
                    <form id="entryForm" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest">Select Date</label>
                            <input type="date" id="entryDate" required>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest">Activity Category</label>
                            <select id="category" required onchange="updateHint()"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest">Result/Value</label>
                            <input type="text" id="value" placeholder="Type here..." required>
                            <p id="hint" class="text-[10px] font-bold text-indigo-600 mt-1 uppercase"></p>
                        </div>
                        <button type="submit" class="w-full gradient-brand text-white font-800 py-4 rounded-xl shadow-lg shadow-indigo-100 hover:opacity-90 transition-all">Submit Entry</button>
                    </form>
                </div>
            </div>

            <!-- Visualization & Logs -->
            <div class="lg:col-span-7 space-y-6">
                <div class="glass-card p-6">
                    <h3 class="text-xs font-900 text-slate-400 uppercase tracking-widest mb-4">Weekly Progress</h3>
                    <div class="h-64"><canvas id="mainChart"></canvas></div>
                </div>

                <div class="glass-card overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                        <h3 class="text-[10px] font-900 text-slate-500 uppercase tracking-widest">Recent Logs</h3>
                        <span id="logCount" class="bg-indigo-100 text-indigo-600 text-[9px] font-900 px-2 py-0.5 rounded-full">0 Entries</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50/50 text-[10px] font-900 text-slate-400 uppercase">
                                <tr><th class="px-6 py-3">Date</th><th class="px-6 py-3">Activity</th><th class="px-6 py-3">Value</th></tr>
                            </thead>
                            <tbody id="logTable" class="text-sm divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let currentMember = 'Kapil Jindal';
        let chart = null;
        let unsubscribe = null;
        let user = null;

        // Configuration based on the paper tracker images
        const config = {
            'Kapil Jindal': { 
                'Mobile Time': 'min', 'TV Time': 'min', 'Physical Activity': 'min', 
                'Family Time': 'min', 'Coco Time': 'min', 'Hookah': 'duration', 
                'Cigarette': 'count', 'Alcohol': 'qty', 'Junk Food': 'item+qty', 
                'Sleep': 'hrs', 'Reading': 'min', 'Self-Improvement': 'min' 
            },
            'Atharva Jindal': { 
                'Mobile Time': 'min', 'TV Time': 'min', 'Junk Food': 'item+qty', 
                'Self Study': 'min', 'Classwork/Homework': 'min', 'Physical Activity': 'min', 
                'Coco Time': 'min', 'Family Time': 'min' 
            },
            'Rinky Jindal': { 
                'Mobile Time': 'min', 'TV Time': 'min', 'Physical Activity': 'min', 
                'Family Time': 'min', 'Coco Time': 'min', 'Hookah': 'duration', 
                'Alcohol': 'qty', 'Junk Food': 'item+qty', 'Zoho Review': 'min', 
                'Runo Review': 'min', 'Ad Word Review': 'min', 'Office Meeting': 'min' 
            }
        };

        window.changeMember = (name) => {
            currentMember = name;
            document.querySelectorAll('.member-btn').forEach(b => b.classList.toggle('active', b.innerText === name));
            document.getElementById('formName').innerText = name;
            const select = document.getElementById('category');
            select.innerHTML = Object.keys(config[name]).map(c => `<option value="${c}">${c}</option>`).join('');
            window.updateHint();
            if (user) sync();
        };

        window.updateHint = () => {
            const cat = document.getElementById('category').value;
            document.getElementById('hint').innerText = `Unit Tip: ${config[currentMember][cat]}`;
        };

        async function sync() {
            if (unsubscribe) unsubscribe();
            const collectionId = `logs_${currentMember.replace(/\s/g, '_')}`;
            const q = collection(window.db, 'artifacts', window.appId, 'public', 'data', collectionId);
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                const logs = [];
                snapshot.forEach(doc => logs.push(doc.data()));
                renderUI(logs);
            }, (error) => console.error("Snapshot error:", error));
        }

        function renderUI(logs) {
            const sorted = logs.sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('logCount').innerText = `${logs.length} Entries`;
            
            document.getElementById('logTable').innerHTML = sorted.slice(0, 15).map(l => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-bold text-slate-400 whitespace-nowrap">${l.date.split('-').reverse().slice(0,2).join('/')}</td>
                    <td class="px-6 py-4 font-800 text-slate-800">${l.category}</td>
                    <td class="px-6 py-4"><span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg font-900 text-[11px]">${l.value}</span></td>
                </tr>
            `).join('') || '<tr><td colspan="3" class="p-10 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest">Awaiting First Entry</td></tr>';

            updateChart(logs);
        }

        function updateChart(logs) {
            const summary = {};
            logs.forEach(l => {
                const numericVal = parseFloat(l.value.replace(/[^0-9.]/g, '')) || 1;
                summary[l.category] = (summary[l.category] || 0) + numericVal;
            });
            
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: { 
                    labels: Object.keys(summary), 
                    datasets: [{ 
                        data: Object.values(summary), 
                        backgroundColor: '#6366f1', 
                        borderRadius: 6 
                    }] 
                },
                options: { 
                    indexAxis: 'y', 
                    plugins: { legend: { display: false } },
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        x: { grid: { display: false } }, 
                        y: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 } } } 
                    } 
                }
            });
        }

        document.getElementById('entryForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = Date.now().toString();
            const logEntry = { 
                id, 
                date: document.getElementById('entryDate').value, 
                category: document.getElementById('category').value, 
                value: document.getElementById('value').value 
            };
            const collectionId = `logs_${currentMember.replace(/\s/g, '_')}`;
            await setDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', collectionId, id), logEntry);
            document.getElementById('value').value = '';
        };

        onAuthStateChanged(window.auth, (u) => {
            if (u) { 
                user = u; 
                window.changeMember(currentMember); 
            } else { 
                signInAnonymously(window.auth); 
            }
        });

        document.getElementById('entryDate').valueAsDate = new Date();
    </script>
</body>
</html>
